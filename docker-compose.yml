services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    restart: unless-stopped
    ports:
      - 51820:51820/udp
      - 443:443 # for caddy
      - 80:80   # for caddy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
      PEERS: homelab
      ALLOWEDIPS: 10.13.13.1,10.13.13.2
      PERSISTENTKEEPALIVE_PEERS: homelab
      # SERVER_ALLOWEDIPS_PEER_homelab:
    volumes:
      - ./wireguard/config:/config:Z
      - /lib/modules:/lib/modules
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1

  caddy:
    build:
      dockerfile: Dockerfile
      context: ./
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./caddy/config:/etc/caddy:Z
      - caddy_data:/data
      - caddy_config:/config
    network_mode: "service:wireguard"

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config

networks:
  wireguard_net:
    name: wireguard_net
